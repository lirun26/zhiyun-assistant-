chapter: 1
title: "激活系统，越摆烂越强"

summary: |
  林辰是刚入职的普通社畜，在公司以躺平摸鱼著称。这天领导又强迫他加班做方案，林辰果断拒绝，
  全体同事等着看他被开除。就在这时，他脑海中响起一道机械音——万物自动升级系统绑定成功！
  主角越懒惰越摆烂，技能越疯狂自动升级！

